# Zarf Package Definition for LowEndInsight (LEI)
# For air-gapped deployment of OSS supply chain risk analysis
#
# Build:  uds zarf package create . --confirm --set VERSION=0.9.1
# Deploy: uds zarf package deploy zarf-package-lei-*.tar.zst

kind: ZarfPackageConfig
metadata:
  name: lei
  description: "LowEndInsight - OSS Supply Chain Risk Analysis Tool"
  version: "###ZARF_PKG_TMPL_VERSION###"
  url: https://github.com/kitplummer/lowendinsight
  authors: Kit Plummer
  documentation: https://github.com/kitplummer/lowendinsight#readme
  source: https://github.com/kitplummer/lowendinsight
  vendor: Kit Plummer

variables:
  - name: VERSION
    description: "Application version"
  - name: LEI_REGISTRY
    description: "Container registry for LEI image"
    default: "ghcr.io/kitplummer"
  - name: LEI_CACHE_REGISTRY
    description: "OCI registry for LEI cache artifacts"
    default: "ghcr.io/kitplummer"
  - name: LEI_AIRGAPPED_MODE
    description: "Enable air-gapped mode"
    default: "true"

components:
  - name: lei-image
    description: "LowEndInsight container image"
    required: true
    images:
      - "###ZARF_PKG_TMPL_LEI_REGISTRY###/lowendinsight:###ZARF_PKG_TMPL_VERSION###"

  - name: lei-config
    description: "LEI configuration files"
    required: false
    files:
      - source: config/prod.exs
        target: /etc/lei/prod.exs
      - source: schema/
        target: /etc/lei/schema/

  - name: lei-sbom
    description: "LEI Software Bill of Materials"
    required: false
    actions:
      onDeploy:
        after:
          - cmd: |
              echo "Extracting SBOM from LEI container..."
              docker run --rm ###ZARF_PKG_TMPL_LEI_REGISTRY###/lowendinsight:###ZARF_PKG_TMPL_VERSION### sbom cyclonedx > /var/lei/sbom.cdx.json
              docker run --rm ###ZARF_PKG_TMPL_LEI_REGISTRY###/lowendinsight:###ZARF_PKG_TMPL_VERSION### sbom spdx > /var/lei/sbom.spdx.json
            description: "Extract container SBOM"
