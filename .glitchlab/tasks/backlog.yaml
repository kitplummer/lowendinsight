  objective: 'Add comprehensive test suite for task isolation and ordering. Write tests verifying: (1) deterministic ordering by dependencies, (2) sequential execution of conflicting tasks, (3) lock acquisition/release correctness, (4) deadlock prevention, (5) failure handling and rollback.'
  priority: 50
