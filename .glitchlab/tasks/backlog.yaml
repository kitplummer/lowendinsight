- id: gl-task-locking-part1
  objective: 'Implement task-level lock primitives (TaskLock struct) with acquire/release semantics and deadlock detection. Define isolation guarantees: no two tasks holding locks on the same document file execute concurrently.'
  priority: 50
  status: pending
  depends_on: []
  decomposition_depth: 1
  remediation_depth: 0
  is_remediation: false
  files_hint:
  - src/task/lock.rs
  - src/task/mod.rs
  definition_of_done: TaskLock struct exists with acquire(doc_path) -> Result<LockGuard> and release(guard) methods; LockGuard implements Drop for automatic release; deadlock detection via timeout or cycle detection is implemented; cargo test -p glitchlab-task passes; no clippy warnings.
- id: gl-task-locking-part2
  objective: Implement task ordering and sequencing in task queue. Add deterministic ordering by dependency graph (topological sort) and insertion order as tiebreaker. Ensure tasks are dequeued in order respecting dependencies.
  priority: 50
  status: pending
  depends_on: []
  decomposition_depth: 1
  remediation_depth: 0
  is_remediation: false
  files_hint:
  - src/task/queue.rs
  - src/task/mod.rs
  definition_of_done: TaskQueue::new_ordered() constructor exists; tasks are stored in dependency-aware order; TaskQueue::next() returns tasks in topological order; circular dependencies are rejected at enqueue time with clear error; cargo test -p glitchlab-task passes.
- id: gl-task-locking-part3
  objective: Integrate task-level locking into execution engine. Modify TaskExecutor to acquire locks before task execution, hold them during execution, and release on completion or failure. Implement rollback/cleanup on task failure.
  priority: 50
  status: pending
  depends_on:
  - task-locking-part1
  - task-locking-part2
  decomposition_depth: 1
  remediation_depth: 0
  is_remediation: false
  files_hint:
  - src/task/executor.rs
  - src/task/mod.rs
  definition_of_done: TaskExecutor::execute() acquires locks for all task dependencies before execution; locks are held until task completes or fails; on failure, locks are released and task state is rolled back; sequential execution is enforced (no concurrent tasks with overlapping locks); cargo test -p glitchlab-task passes; integration test shows Task A and Task B writing to same doc execute sequentially with no interleaved writes.
