name: umbrella_ci

on:
  push:
  pull_request:
    types: [opened]

jobs:
  # LEI library tests — requires Postgres for API key/auth features
  lei-lib:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
      CI: true
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lowendinsight_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    - name: Setup Elixir
      uses: erlef/setup-beam@v1
      with:
        elixir-version: 1.16.3
        otp-version: 26.2
    - name: Install Dependencies
      run: |
        mix local.rebar --force
        mix local.hex --force
        mix deps.get
    - name: Setup Database
      run: |
        cd apps/lowendinsight && MIX_ENV=test mix ecto.create && MIX_ENV=test mix ecto.migrate
    - name: Run LEI Library Tests
      run: |
        git config --global --add safe.directory /__w/lowendinsight/lowendinsight
        max_attempts=5
        attempt=1
        until cd apps/lowendinsight && MIX_ENV=test mix test --exclude network --exclude long && cd ../..; do
          cd $GITHUB_WORKSPACE
          if [ $attempt -ge $max_attempts ]; then
            echo "All $max_attempts attempts failed"
            exit 1
          fi
          echo "Attempt $attempt failed, retrying in 2s..."
          attempt=$((attempt + 1))
          sleep 2
        done
    - name: Generate Docs
      run: |
        cd apps/lowendinsight && MIX_ENV=dev mix docs
    - name: LowEndInsight Scan
      continue-on-error: true
      run: |
        cd apps/lowendinsight && mix lei.scan ../..

  # LEI-get API tests — requires Postgres + Redis
  lei-get:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lowendinsight_get_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    - name: Setup Elixir
      uses: erlef/setup-beam@v1
      with:
        elixir-version: 1.16.3
        otp-version: 26.2
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    - uses: zhulik/redis-action@1.1.0
      with:
        redis version: '7'
        number of databases: 20
    - name: Install Dependencies
      run: |
        npm install -g newman
        mix local.rebar --force
        mix local.hex --force
        mix deps.get
    - name: Setup Database
      run: |
        MIX_ENV=test mix ecto.create
        MIX_ENV=test mix ecto.migrate
    - name: Run LEI-get Tests
      run: cd apps/lowendinsight_get && MIX_ENV=test mix test

  # Dependency audit
  audit:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    container:
      image: elixir:1.16.3-alpine

    steps:
    - uses: actions/checkout@v4
    - name: Install Dependencies
      run: |
        apk add git
        mix local.rebar --force
        mix local.hex --force
        mix deps.get
    - name: Run Audit
      run: |
        MIX_ENV=test mix deps.audit
