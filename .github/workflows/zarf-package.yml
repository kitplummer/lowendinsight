name: zarf_package

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 0.9.1)'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  zarf-package:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
        else
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
        fi

    - name: Install UDS CLI
      run: |
        curl -fsSL https://uds.defenseunicorns.com/install.sh | bash
        sudo mv uds /usr/local/bin/
        uds version

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Lint Zarf package
      run: uds zarf dev lint .

    - name: Build container image
      run: |
        docker build -f Dockerfile.prod \
          -t ghcr.io/${{ github.repository_owner }}/lowendinsight:${VERSION} \
          -t ghcr.io/${{ github.repository_owner }}/lowendinsight:latest \
          .

    - name: Push container image
      run: |
        docker push ghcr.io/${{ github.repository_owner }}/lowendinsight:${VERSION}
        docker push ghcr.io/${{ github.repository_owner }}/lowendinsight:latest

    - name: Create Zarf package
      run: |
        uds zarf package create . --confirm \
          --set VERSION=${VERSION} \
          --set LEI_REGISTRY=ghcr.io/${{ github.repository_owner }}

    - name: Publish Zarf package to GHCR
      run: |
        uds zarf package publish zarf-package-lei-*.tar.zst \
          oci://ghcr.io/${{ github.repository_owner }}/packages

    - name: Upload Zarf package artifact
      uses: actions/upload-artifact@v4
      with:
        name: zarf-package-lei
        path: zarf-package-lei-*.tar.zst
        retention-days: 30
