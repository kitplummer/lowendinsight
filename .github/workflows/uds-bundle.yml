name: uds_bundle

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 0.9.1)'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build-bundle:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
        elif [ "${{ github.event_name }}" = "push" ]; then
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
        else
          echo "VERSION=dev-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
        fi

    - name: Install UDS CLI
      uses: defenseunicorns/setup-uds@v1.0.1

    - name: Login to GHCR
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build LEI container image
      run: |
        docker build -f apps/lowendinsight/Dockerfile.prod \
          -t ghcr.io/${{ github.repository_owner }}/lowendinsight:${VERSION} \
          .

    - name: Create Zarf package
      run: |
        cd apps/lowendinsight
        uds zarf package create . --confirm \
          --set VERSION=${VERSION} \
          --set LEI_REGISTRY=ghcr.io/${{ github.repository_owner }} \
          --set LEI_CACHE_REGISTRY=ghcr.io/${{ github.repository_owner }}

    - name: Create UDS bundle
      continue-on-error: true
      run: uds create . --confirm

    - name: Publish bundle to GHCR
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      run: |
        uds publish uds-bundle-lei-*.tar.zst \
          oci://ghcr.io/${{ github.repository_owner }}/bundles

    - name: Upload bundle artifact
      uses: actions/upload-artifact@v4
      with:
        name: uds-bundle-lei
        path: uds-bundle-lei-*.tar.zst
        retention-days: 14
