# UDS Runner Tasks for LowEndInsight
# Run with: uds run <task-name>
#
# Prerequisites:
#   - UDS CLI installed (https://uds.defenseunicorns.com/)
#   - Docker running
#   - k3d or compatible cluster for deploy tasks

variables:
  - name: VERSION
    default: "0.9.1"
  - name: REGISTRY
    default: "ghcr.io/kitplummer"

tasks:
  # ---------- Build Tasks ----------

  - name: build-image
    description: "Build the LEI production container image"
    actions:
      - cmd: docker build -f Dockerfile.prod -t ${REGISTRY}/lowendinsight:${VERSION} .
      - cmd: docker tag ${REGISTRY}/lowendinsight:${VERSION} ${REGISTRY}/lowendinsight:latest

  - name: create-package
    description: "Create Zarf package for LEI"
    actions:
      - cmd: zarf package create . --confirm --set VERSION=${VERSION}

  - name: create-bundle
    description: "Create UDS bundle with LEI + dependencies"
    actions:
      - task: build-image
      - task: create-package
      - cmd: uds create . --confirm

  # ---------- Deploy Tasks ----------

  - name: dev
    description: "Full dev workflow: build + deploy to local k3d cluster"
    actions:
      - task: create-bundle
      - task: deploy

  - name: deploy
    description: "Deploy UDS bundle to current cluster"
    actions:
      - cmd: uds deploy uds-bundle-lei-*.tar.zst --confirm --config uds-config.yaml

  - name: remove
    description: "Remove LEI deployment from cluster"
    actions:
      - cmd: uds remove uds-bundle-lei-*.tar.zst --confirm

  # ---------- Test Tasks ----------

  - name: test
    description: "Run validation tests against deployed LEI"
    actions:
      - cmd: |
          echo "Checking LEI pods..."
          kubectl get pods -n lei -l app=lei-get --no-headers | grep Running
          echo ""
          echo "Checking health endpoint..."
          kubectl port-forward -n lei svc/lei-get 4000:4000 &
          PF_PID=$!
          sleep 3
          curl -sf http://localhost:4000/healthz && echo " OK" || echo " FAIL"
          curl -sf http://localhost:4000/readyz && echo " OK" || echo " FAIL"
          curl -sf http://localhost:4000/metrics | head -5
          kill $PF_PID 2>/dev/null
        description: "Validate LEI deployment"

  - name: journey-test
    description: "Run full journey tests"
    actions:
      - cmd: tests/journey.sh
        description: "Execute journey test suite"

  - name: upgrade-test
    description: "Run upgrade tests"
    actions:
      - cmd: tests/upgrade.sh
        description: "Execute upgrade test suite"

  # ---------- Utility Tasks ----------

  - name: lint
    description: "Lint Zarf package definition"
    actions:
      - cmd: zarf dev lint .

  - name: sbom
    description: "Extract SBOM from LEI container"
    actions:
      - cmd: |
          docker run --rm ${REGISTRY}/lowendinsight:${VERSION} sbom cyclonedx > sbom.cdx.json
          docker run --rm ${REGISTRY}/lowendinsight:${VERSION} sbom spdx > sbom.spdx.json
          echo "SBOMs written to sbom.cdx.json and sbom.spdx.json"
